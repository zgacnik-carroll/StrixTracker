<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Owl Sightings</title>
    <link rel="stylesheet" th:href="@{/css/sightings.css}">
</head>
<body>
<div class="container">

    <!-- Navigation -->
    <nav>
        <a th:href="@{/sightings/new}">Add Sighting</a>

        <!-- Logout -->
        <a href="#" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
            Logout
        </a>
        <form id="logout-form" th:action="@{/logout}" method="post" style="display:none;">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
        </form>
    </nav>

    <h2>Owl Sightings</h2>

    <ul>
        <li th:each="s : ${sightings}">
            <b th:text="${s['species']}">Species</b> -
            <span th:text="${s['location']}">Location</span> -
            <span th:text="${s['dateTime']}">Date/Time</span>
            <p th:text="${s['notes']}">Notes</p>
        </li>
    </ul>

</div>
</body>
</html>
